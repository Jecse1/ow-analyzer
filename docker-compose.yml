version: '3.8'

services:
  backend:
    build: ./backend
    container_name: overwatch-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: overwatch-frontend
    ports:
      - "80:80"
    depends_on:
      - backend